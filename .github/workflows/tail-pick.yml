name: Tail Pick Daily

on:
  schedule:
    # 北京时间 14:35，周一至周五 (UTC 06:35)
    - cron: "35 6 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "watchlist=分析固定清单；scan=全市场扫描只推buy候选"
        required: false
        default: "watchlist"
        type: choice
        options:
          - watchlist
          - scan

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan market (buy candidates only)
        if: ${{ github.event.inputs.mode == 'scan' }}
        run: python scan_market.py

      - name: Analyze watchlist
        if: ${{ github.event.inputs.mode != 'scan' }}
        run: python tail_pick.py --list watchlist.txt

      - name: Push result to Feishu
        if: always()
        run: python notify_feishu.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tail-pick-result
          path: tail_pick_result.json
          if-no-files-found: warn
