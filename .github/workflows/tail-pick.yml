name: Tail Pick Daily

on:
  schedule:
    # 北京时间 14:35，周一至周五 (UTC 06:35)
    - cron: "35 6 * * 1-5"
  workflow_dispatch:
    inputs:
      codes:
        description: "股票代码，空格分隔（留空则用 watchlist.txt）"
        required: false
        default: ""

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tail pick analysis
        run: |
          CODES="${{ github.event.inputs.codes }}"
          if [ -n "$CODES" ]; then
            python tail_pick.py $CODES
          else
            python tail_pick.py --list watchlist.txt
          fi

      - name: Push result to Feishu
        if: always()
        run: python notify_feishu.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tail-pick-result
          path: tail_pick_result.json
          if-no-files-found: warn
